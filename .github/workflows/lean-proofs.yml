name: Verify Lean Proofs

# Runs on every push/PR to main, and can be triggered manually.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: Build & Verify Lean 4 Proofs
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: formal-lean

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Cache elan, the Lean toolchain, Mathlib pre-built artifacts, and the
      # .lake build directory.  The cache is keyed on the lean-toolchain and
      # lakefile so a toolchain/dependency bump busts the cache automatically.
      # The cache step is placed *before* the install step so that a cache hit
      # skips the network-heavy toolchain download entirely.
      - name: Cache Lean / Mathlib build artifacts
        id: lean-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            formal-lean/.lake/packages
            formal-lean/.lake/build
          key: lake-${{ runner.os }}-${{ hashFiles('formal-lean/lean-toolchain', 'formal-lean/lakefile.lean') }}
          restore-keys: |
            lake-${{ runner.os }}-

      # Install elan (pinned to v4.2.1 — the latest stable release — to avoid
      # the "failed to parse latest release tag" error that occurs when elan
      # fetches its own update metadata from GitHub at startup).
      # We pass --default-toolchain so elan installs the Lean toolchain in one
      # step, eliminating the need for a separate `elan toolchain install` call.
      # The step is skipped when the cache contains a usable elan installation.
      - name: Install elan and Lean toolchain
        if: steps.lean-cache.outputs.cache-hit != 'true'
        run: |
          LEAN_TC="$(cat lean-toolchain)"
          curl -fsSL "https://raw.githubusercontent.com/leanprover/elan/v4.2.1/elan-init.sh" \
            | sh -s -- -y --default-toolchain "$LEAN_TC" --no-modify-path

      - name: Add elan to PATH
        run: echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      # Download pre-compiled Mathlib oleans from the community cache server.
      # This is ~300 MB but avoids a ~60-minute local compilation.
      - name: Download Mathlib prebuilt cache
        run: lake exe cache get

      # Compile every module listed in lakefile.lean.
      # A non-zero exit code means at least one proof is broken.
      - name: Build all Lean modules (lake build)
        run: lake build

      # Run the formalLean executable, which prints a structured summary of
      # every verified theorem.  The output is saved both as a step summary
      # (visible in the Actions UI) and as a downloadable artifact.
      - name: Print verified theorem summary
        run: |
          lake exe formalLean | tee /tmp/theorem-summary.txt
          echo "## 📐 Verified Theorem Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/theorem-summary.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload theorem summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: theorem-summary
          path: /tmp/theorem-summary.txt
          retention-days: 90
