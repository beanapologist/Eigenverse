name: Render Manim Animations

# Trigger whenever a Manim scene or its requirements change.
on:
  push:
    paths:
      - 'manim/scenes/**'
      - 'manim/requirements.txt'
      - '.github/workflows/manim.yml'
  pull_request:
    paths:
      - 'manim/scenes/**'
      - 'manim/requirements.txt'
      - '.github/workflows/manim.yml'
  workflow_dispatch:

jobs:
  render:
    name: Render Manim scenes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── System dependencies required by Manim ──────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            libcairo2-dev \
            libpango1.0-dev \
            pkg-config \
            python3-dev \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            dvipng \
            cm-super

      # ── Python / Manim ─────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: manim/requirements.txt

      - name: Install Python dependencies
        run: pip install -r manim/requirements.txt

      # ── Render every scene file found in manim/scenes/ ─────────────────────
      - name: Render all scenes
        run: |
          mkdir -p manim/results
          for scene_file in manim/scenes/*.py; do
            echo "Rendering $scene_file …"
            manim --media_dir manim/results -ql "$scene_file"
          done

      # ── Upload rendered videos as a workflow artifact ───────────────────────
      - name: Upload rendered animations
        uses: actions/upload-artifact@v4
        with:
          name: manim-animations
          path: manim/results/
          retention-days: 30
          if-no-files-found: warn
